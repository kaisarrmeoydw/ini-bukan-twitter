name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Configure GitHub Pages URL
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_name="${GITHUB_REPOSITORY_OWNER,,}"
          if [ "${repo_name,,}" = "${GITHUB_REPOSITORY_OWNER,,}.github.io" ]; then
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${owner_name}.github.io" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_URL=https://${owner_name}.github.io" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_BASE_PATH=/${repo_name}" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${owner_name}.github.io/${repo_name}" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_URL=https://${owner_name}.github.io/${repo_name}" >> "$GITHUB_ENV"
          fi
      - run: npm ci
      - run: npm run export
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
